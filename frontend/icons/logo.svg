<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D1A"/>
      <stop offset="100%" style="stop-color:#1A0A2E"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7"/>
      <stop offset="50%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#FF6584"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6584;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  
  <!-- Subtle radial glow bg -->
  <circle cx="256" cy="256" r="200" fill="url(#g2)"/>
  
  <!-- Sound wave bars - left side (5 bars, shorter) -->
  <rect x="95" y="232" width="18" height="48" rx="9" fill="url(#g1)" opacity="0.5" filter="url(#softglow)"/>
  <rect x="122" y="210" width="18" height="92" rx="9" fill="url(#g1)" opacity="0.65" filter="url(#softglow)"/>
  <rect x="149" y="190" width="18" height="132" rx="9" fill="url(#g1)" opacity="0.8" filter="url(#softglow)"/>
  
  <!-- Center bars - tallest, brightest -->
  <rect x="178" y="165" width="22" height="182" rx="11" fill="url(#g1)" filter="url(#glow)"/>
  <rect x="210" y="148" width="22" height="216" rx="11" fill="url(#g1)" filter="url(#glow)"/>
  <rect x="244" y="130" width="24" height="252" rx="12" fill="url(#g1)" filter="url(#glow)"/>
  <rect x="280" y="148" width="22" height="216" rx="11" fill="url(#g1)" filter="url(#glow)"/>
  <rect x="314" y="165" width="22" height="182" rx="11" fill="url(#g1)" filter="url(#glow)"/>
  
  <!-- Right side bars (shorter) -->
  <rect x="345" y="190" width="18" height="132" rx="9" fill="url(#g1)" opacity="0.8" filter="url(#softglow)"/>
  <rect x="372" y="210" width="18" height="92" rx="9" fill="url(#g1)" opacity="0.65" filter="url(#softglow)"/>
  <rect x="399" y="232" width="18" height="48" rx="9" fill="url(#g1)" opacity="0.5" filter="url(#softglow)"/>
  
  <!-- White dot center (like a music note dot) -->
  <circle cx="256" cy="256" r="14" fill="white" opacity="0.95" filter="url(#glow)"/>
</svg>