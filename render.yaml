services:
  - type: web
    name: sona
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: YOUTUBE_API_KEY
        sync: false
      - key: CACHE_DIR
        value: /tmp/sona_cache
